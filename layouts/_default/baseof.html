<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}

  <main class="layout-wrapper">
    <section class="content-primary">
      {{ block "main" . }}{{ end }}
    </section>

    <aside class="sidebar content-secondary">
      {{ partial "sidebar.html" . }}
    </aside>
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
